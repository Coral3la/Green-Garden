<div class="plant-list-header">
  <h2>My Urban Garden 🌱</h2>
  <button type="button" class="btn-add" (click)="openAddModal()">+ Add Plant</button>
</div>

@if (modalOpen()) {
  <div
    class="modal-backdrop"
    (click)="closeModal()"
    (document:keydown.escape)="closeModal()"
  >
    <div class="modal-content" (click)="$event.stopPropagation()">
      <app-add-plant-form
        [plantToEdit]="editingPlant()"
        (formSaved)="closeModal()"
        (cancel)="closeModal()"
      />
    </div>
  </div>
}

<div class="plant-grid">
  @for (plant of plants(); track plant.id) {
    <app-plant-card
      [plant]="plant"
      (watered)="onWatered($event)"
      (delete)="onDelete($event)"
      (edit)="openEditModal($event)"
      (consult)="openConsultModal($event)"
    />
  }
</div>

@if (consultingPlant(); as plant) {
  <div
    class="modal-backdrop"
    (click)="closeConsultModal()"
    (document:keydown.escape)="closeConsultModal()"
  >
    <div
      class="modal-content modal-content--consult"
      (click)="$event.stopPropagation()"
    >
      <button
        type="button"
        class="modal-close"
        (click)="closeConsultModal()"
        aria-label="Close consultation"
      >
        ✕
      </button>
      <app-botanic-expert [plant]="plant" />
    </div>
  </div>
}

@if (plants().length === 0) {
  <p class="empty-state">No plants yet. Add one to get started! 🌱</p>
}
