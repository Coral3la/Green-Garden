<section class="dashboard">
  <h2 class="section-eyebrow">Garden Overview</h2>
  <div class="stats-grid">
    <article class="stat-card">
      <span class="stat-card__icon" aria-hidden="true">🌿</span>
      <div class="stat-card__body">
        <div class="stat-value">{{ totalPlants() }}</div>
        <div class="stat-label">Plants in your garden</div>
      </div>
    </article>

    <article class="stat-card" [class.alert]="plantsNeedingWater() > 0">
      <span class="stat-card__icon" aria-hidden="true">💧</span>
      <div class="stat-card__body">
        <div class="stat-value">{{ plantsNeedingWater() }}</div>
        <div class="stat-label">Need watering today</div>
      </div>
    </article>
  </div>
</section>
